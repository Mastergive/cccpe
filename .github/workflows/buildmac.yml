name: Build ClassiCube (Windows Style)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Download and Build
        run: |
          # 1. Get the zip
          curl -L -o project.zip "http://put.nu/files/5jDwj1m.zip"
          unzip project.zip
          
          # 2. Go into the folder (Just like you do on Windows)
          cd ClassiCube-master
          
          # 3. The One Command (Simplified for Mac)
          # We use 'find' inside the command to grab all the BearSSL files automatically
          cc src/*.c src/Window_cocoa.m $(find third_party/bearssl -name "*.c") \
            -o ClassiCube_Mac \
            -framework Security -framework Cocoa -framework OpenGL -framework IOKit -lobjc \
            -O2 -fno-stack-protector -DCC_COMMIT_SHA=\"fast-build\"
          
          # 4. Move the finished product out so we can upload it
          mv ClassiCube_Mac ../ClassiCube_Mac

      - name: Upload Finished Game
        uses: actions/upload-artifact@v4
        with:
          name: ClassiCube-Mac
          path: ClassiCube_Mac
