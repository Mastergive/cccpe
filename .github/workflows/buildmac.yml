name: Build ClassiCube (Direct Root Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Download and Unzip
        run: |
          # 1. Download the zip
          curl -L -o project.zip "http://put.nu/files/5jDwj1m.zip"
          
          # 2. Unzip directly into the current workspace
          unzip project.zip
          
          # 3. List files just to be 100% sure we see 'src'
          ls -F

      - name: Compile Mac Binary
        run: |
          # 4. Run the compiler since 'src' is right here
          # We use $(find ...) to make sure we grab every BearSSL .c file
          cc src/*.c src/Window_cocoa.m $(find third_party/bearssl -name "*.c") \
            -o ClassiCube_Mac \
            -framework Security -framework Cocoa -framework OpenGL -framework IOKit -lobjc \
            -O2 -fno-stack-protector -DCC_COMMIT_SHA=\"direct-build\"
          
          # 5. Make it executable
          chmod +x ClassiCube_Mac

      - name: Upload Finished Game
        uses: actions/upload-artifact@v4
        with:
          name: ClassiCube-Mac
          path: ClassiCube_Mac
