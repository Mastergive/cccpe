name: Build ClassiCube (Header Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Download and Unzip
        run: |
          curl -L -o project.zip "http://put.nu/files/5jDwj1m.zip"
          unzip project.zip
          
      - name: Compile Mac Binary
        run: |
          # 1. Find all BearSSL .c files
          BEAR_SRCS=$(find third_party/bearssl -name "*.c")
          
          # 2. Find every folder inside bearssl that has a .h file
          # This creates a list of "Include" paths so 'bearssl.h' is found
          BEAR_INCLUDES=$(find third_party/bearssl -type d -exec echo -I{} \;)

          # 3. The Grand Spell
          # We add $BEAR_INCLUDES to the command
          cc src/*.c src/Window_cocoa.m $BEAR_SRCS \
            -o ClassiCube_Mac \
            $BEAR_INCLUDES -Isrc \
            -framework Security -framework Cocoa -framework OpenGL -framework IOKit -lobjc \
            -O2 -fno-stack-protector -DCC_COMMIT_SHA=\"header-fix\"
          
          chmod +x ClassiCube_Mac

      - name: Upload Finished Game
        uses: actions/upload-artifact@v4
        with:
          name: ClassiCube-Mac
          path: ClassiCube_Mac
