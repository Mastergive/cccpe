name: Build ClassiCube for Mac

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Download and Unzip Source
        run: |
          # Replace with your actual zip link
          curl -L -o classicube_src.zip "http://put.nu/files/5jDwj1m.zip"
          unzip classicube_src.zip -d source_code
          
      - name: Compile for macOS
        run: |
          # Find the directory containing the source files
          cd $(find source_code -name "Makefile" -exec dirname {} \;)
          
          # ClassiCube uses 'make' with specific flags for Mac
          # We use -j$(sysctl -n hw.ncpu) to make it build faster
          make darwin CC=cc -j$(sysctl -n hw.ncpu)

      - name: Check output
        run: |
          cd $(find source_code -name "Makefile" -exec dirname {} \;)
          ls -lh ClassiCube  # This verifies the file was created

      - name: Upload Mac Binary
        uses: actions/upload-artifact@v4
        with:
          name: ClassiCube-Mac
          path: "**/ClassiCube"
