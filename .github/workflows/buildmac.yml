name: Build ClassiCube (Mac 64-bit Clean)

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Download and Prepare Source
        run: |
          # 1. Get your zip
          curl -L -o project.zip "http://put.nu/files/5jDwj1m.zip"
          unzip project.zip -d temp_folder
          
          # 2. Find where 'src' is and move it to the root
          SRC_PATH=$(find temp_folder -name "src" -type d -firstparent)
          THIRD_PARTY=$(find temp_folder -name "third_party" -type d -firstparent)
          mv "$SRC_PATH" ./src
          mv "$THIRD_PARTY" ./third_party

      - name: Compile Universal Binary
        shell: bash
        env: 
          # Only the frameworks Mac actually needs
          LIBS: "-framework Security -framework Cocoa -framework OpenGL -framework IOKit -lobjc"
          # Only the source files needed for the game + Mac windowing + SSL
          SRCS: "src/*.c src/Window_cocoa.m third_party/bearssl/*.c"
          # Clean optimization flags
          FLAGS: "-O2 -s -fno-stack-protector -fvisibility=hidden"
        run: |
          # Build for Intel Macs (x86_64)
          clang ${{ env.SRCS }} ${{ env.FLAGS }} -arch x86_64 -o CC_intel ${{ env.LIBS }} -DCC_COMMIT_SHA=\"clean-build\"
          
          # Build for Apple Silicon Macs (M1/M2/M3)
          clang ${{ env.SRCS }} ${{ env.FLAGS }} -arch arm64 -o CC_arm ${{ env.LIBS }} -DCC_COMMIT_SHA=\"clean-build\" -DCC_GFX_BACKEND=CC_GFX_BACKEND_GL2
          
          # Combine them into one 'Universal' file
          lipo -create -output ClassiCube_Mac CC_intel CC_arm
          chmod +x ClassiCube_Mac

      - name: Upload Clean Build
        uses: actions/upload-artifact@v4
        with:
          name: ClassiCube-macOS
          path: ClassiCube_Mac
