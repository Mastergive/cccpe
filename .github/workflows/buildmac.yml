name: Cross-Compile Mac from Linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download Source
        run: |
          curl -L -o project.zip "http://put.nu/files/5jDwj1m.zip"
          unzip project.zip
          
      - name: Setup OSXCross
        # This action sets up the Mac compiler on top of Linux
        uses: mbround18/setup-osxcross@v1
        with:
          osx-version: "12.3"

      - name: Compile for Mac 64-bit
        run: |
          # 1. We use 'o64-clang' (the OSXCross version of clang)
          # It automatically knows where the Mac headers are!
          
          # Gather only the necessary core files
          CORE_FILES=$(find src -maxdepth 1 -name "*.c" \
            ! -name "Platform_*" ! -name "Window_*" ! -name "Sound_*" ! -name "Gfx_*" ! -name "Input_*")
            
          # Add the Mac specific files
          MAC_FILES="src/Platform_Posix.c src/Window_cocoa.m src/Graphics_GL2.c src/Input_Cocoa.c src/Sound_OpenAL.c"

          o64-clang $CORE_FILES $MAC_FILES \
            -o ClassiCube_Mac \
            -Isrc -DCC_BUILD_NOSSL -O2 \
            -framework Security -framework Cocoa -framework OpenGL -framework IOKit -framework OpenAL -lobjc \
            -D_GNU_SOURCE

      - name: Upload Final Mac Binary
        uses: actions/upload-artifact@v4
        with:
          name: ClassiCube-Mac-from-Linux
          path: ClassiCube_Mac
