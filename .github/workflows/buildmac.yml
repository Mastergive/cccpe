name: Build ClassiCube (Legacy Header Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Download and Unzip
        run: |
          curl -L -o project.zip "http://put.nu/files/5jDwj1m.zip"
          unzip project.zip
          
      - name: Compile Mac Binary
        run: |
          # 1. Gather all C files
          BEAR_SRCS=$(find third_party/bearssl -name "*.c")
          
          # 2. Map out all Include directories
          BEAR_INCLUDES=$(find third_party/bearssl -type d -exec echo -I{} \;)

          # 3. THE FIX: We use '-include string.h' to satisfy the 'memcpy' errors
          # Also added '-include stdlib.h' just in case it asks for 'malloc' next
          cc src/*.c src/Window_cocoa.m $BEAR_SRCS \
            -o ClassiCube_Mac \
            $BEAR_INCLUDES -Isrc \
            -include string.h -include stdlib.h \
            -framework Security -framework Cocoa -framework OpenGL -framework IOKit -lobjc \
            -O2 -fno-stack-protector -DCC_COMMIT_SHA=\"legacy-fix\"
          
          chmod +x ClassiCube_Mac

      - name: Upload Finished Game
        uses: actions/upload-artifact@v4
        with:
          name: ClassiCube-Mac
          path: ClassiCube_Mac
