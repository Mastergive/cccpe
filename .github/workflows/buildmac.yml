name: Build ClassiCube (Ultra-Clean No-SSL)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Download and Unzip
        run: |
          curl -L -o project.zip "http://put.nu/files/5jDwj1m.zip"
          unzip project.zip
          
      - name: Compile Mac Binary (Direct src)
        run: |
          # 1. THE FAST COMMAND: Only look at the src folder
          # We add -DCC_BUILD_NOSSL to tell the game to ignore BearSSL
          cc src/*.c src/Window_cocoa.m \
            -o ClassiCube_Mac \
            -Isrc \
            -DCC_BUILD_NOSSL \
            -framework Security -framework Cocoa -framework OpenGL -framework IOKit -lobjc \
            -O2 -fno-stack-protector -DCC_COMMIT_SHA=\"nossl-build\"
          
          chmod +x ClassiCube_Mac

      - name: Upload Finished Game
        uses: actions/upload-artifact@v4
        with:
          name: ClassiCube-Mac-Lite
          path: ClassiCube_Mac
